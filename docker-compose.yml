version: '3.8'

services:
  openclaw-easy:
    build: .
    image: openclaw-easy:latest
    container_name: openclaw-easy
    restart: unless-stopped
    ports:
      - "18780:18780"
      - "18789:18789"
      - "18790:18790"
    volumes:
      - ./openclaw-data:/root/.openclaw
    environment:
      - TZ=Asia/Shanghai

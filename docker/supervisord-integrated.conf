[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
loglevel=info

[program:openclaw-gateway]
command=/usr/local/bin/init-integrated.sh
autostart=true
autorestart=true
startsecs=10
stopwaitsecs=30
stdout_logfile=/var/log/supervisor/gateway.log
stderr_logfile=/var/log/supervisor/gateway-error.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=HOME="/root",NODE_PATH="/usr/local/lib/node_modules"
priority=1

[program:openclaw-easy]
command=node /app/openclaw-easy/server.js
directory=/app/openclaw-easy
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/easy.log
stderr_logfile=/var/log/supervisor/easy-error.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=HOME="/root",PORT="18780"
priority=2
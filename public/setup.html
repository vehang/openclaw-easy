<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始化设置 - OpenClaw Easy</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        .password-requirements {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .password-requirements li {
            margin: 4px 0;
            padding-left: 20px;
            position: relative;
            list-style: none;
        }
        .password-requirements li::before {
            content: '○';
            position: absolute;
            left: 0;
            color: var(--text-muted);
        }
        .password-requirements li.valid {
            color: #16a34a;
        }
        .password-requirements li.valid::before {
            content: '●';
            color: #16a34a;
        }
        .password-requirements li.invalid {
            color: var(--primary-color);
        }
        .password-requirements li.invalid::before {
            content: '○';
            color: var(--primary-color);
        }
        .strength-bar {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .strength-bar-fill {
            height: 100%;
            width: 0;
            transition: width 0.3s, background 0.3s;
            border-radius: 2px;
        }
        .strength-bar-fill.weak { width: 25%; background: #ef4444; }
        .strength-bar-fill.fair { width: 50%; background: #f97316; }
        .strength-bar-fill.good { width: 75%; background: #eab308; }
        .strength-bar-fill.strong { width: 100%; background: #16a34a; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card fade-in" style="max-width: 480px;">
            <div class="login-header">
                <div class="logo-icon"><span class="iconify" data-icon="noto:lobster" style="font-size: 36px;"></span></div>
                <h1>欢迎使用 OpenClaw Easy</h1>
                <p>首次使用，请设置管理密码</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form id="setupForm">
                        <div class="form-group">
                            <label class="form-label">
                                设置管理密码 <span class="required">*</span>
                            </label>
                            <input type="password" class="form-control" id="password"
                                   placeholder="请输入密码" required autofocus>
                            <div class="strength-bar">
                                <div class="strength-bar-fill" id="strengthBar"></div>
                            </div>
                            <div id="passwordRequirements" style="margin-top: 8px; font-size: 12px; color: var(--text-secondary);">
                                <div style="display: flex; gap: 16px;">
                                    <span id="req-length" style="flex: 1;">至少 8 个字符</span>
                                    <span id="req-number" style="flex: 1;">包含数字 (0-9)</span>
                                </div>
                                <div style="display: flex; gap: 16px; margin-top: 4px;">
                                    <span id="req-upper" style="flex: 1;">包含大写字母 (A-Z)</span>
                                    <span id="req-lower" style="flex: 1;">包含小写字母 (a-z)</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                确认密码 <span class="required">*</span>
                            </label>
                            <input type="password" class="form-control" id="confirmPassword"
                                   placeholder="请再次输入密码" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-lg" id="setupBtn">
                            完成设置
                        </button>
                    </form>
                </div>
            </div>

            <p style="text-align: center; margin-top: 16px; color: var(--text-secondary); font-size: 13px;">
                设置完成后将自动进入配置管理界面
            </p>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/app.js"></script>
    <script>
        /**
         * 密码强度检测
         */
        function checkPasswordStrength(password) {
            const checks = {
                length: password.length >= 8,
                lower: /[a-z]/.test(password),
                upper: /[A-Z]/.test(password),
                number: /[0-9]/.test(password)
            };

            // 更新要求列表状态
            const updateReq = (id, valid) => {
                const el = document.getElementById(id);
                el.style.color = password.length === 0 ? '' : (valid ? '#16a34a' : '#ef4444');
            };
            updateReq('req-length', checks.length);
            updateReq('req-lower', checks.lower);
            updateReq('req-upper', checks.upper);
            updateReq('req-number', checks.number);

            // 计算强度
            const score = Object.values(checks).filter(Boolean).length;
            const strengthBar = document.getElementById('strengthBar');

            strengthBar.className = 'strength-bar-fill';
            if (password.length === 0) {
                strengthBar.style.width = '0';
            } else if (score === 1) {
                strengthBar.classList.add('weak');
            } else if (score === 2) {
                strengthBar.classList.add('fair');
            } else if (score === 3) {
                strengthBar.classList.add('good');
            } else if (score === 4) {
                strengthBar.classList.add('strong');
            }

            return checks;
        }

        // 监听密码输入
        document.getElementById('password').addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });

        /**
         * 初始化设置页面逻辑
         */
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const setupBtn = document.getElementById('setupBtn');

            // 验证密码强度
            const checks = checkPasswordStrength(password);
            const allValid = Object.values(checks).every(Boolean);

            if (!allValid) {
                showToast('请满足所有密码要求', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('两次输入的密码不一致', 'error');
                return;
            }

            // 显示加载状态
            setupBtn.disabled = true;
            setupBtn.innerHTML = '<span class="loading"></span> 设置中...';

            try {
                const response = await fetch('/api/setup/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, confirmPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('密码设置成功', 'success');
                    // 跳转到首页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    showToast(data.error || '设置失败', 'error');
                    setupBtn.disabled = false;
                    setupBtn.textContent = '完成设置';
                }
            } catch (error) {
                console.error('设置错误:', error);
                showToast('网络错误，请重试', 'error');
                setupBtn.disabled = false;
                setupBtn.textContent = '完成设置';
            }
        });
    </script>
</body>
</html>

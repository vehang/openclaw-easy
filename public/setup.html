<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始化设置 - OpenClaw Easy</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card fade-in" style="max-width: 480px;">
            <div class="login-header">
                <div class="logo-icon">OC</div>
                <h1>欢迎使用 OpenClaw Easy</h1>
                <p>首次使用，请设置管理密码</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form id="setupForm">
                        <div class="form-group">
                            <label class="form-label">
                                设置管理密码 <span class="required">*</span>
                            </label>
                            <input type="password" class="form-control" id="password"
                                   placeholder="请输入密码（至少6位）" required autofocus>
                            <p class="form-hint">此密码用于后续登录管理界面，请妥善保管</p>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                确认密码 <span class="required">*</span>
                            </label>
                            <input type="password" class="form-control" id="confirmPassword"
                                   placeholder="请再次输入密码" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-lg" id="setupBtn">
                            完成设置
                        </button>
                    </form>
                </div>
            </div>

            <p style="text-align: center; margin-top: 16px; color: var(--text-secondary); font-size: 13px;">
                设置完成后将自动进入配置管理界面
            </p>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/app.js"></script>
    <script>
        /**
         * 初始化设置页面逻辑
         */
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const setupBtn = document.getElementById('setupBtn');

            // 验证密码
            if (!password || password.length < 6) {
                showToast('密码长度至少6位', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('两次输入的密码不一致', 'error');
                return;
            }

            // 显示加载状态
            setupBtn.disabled = true;
            setupBtn.innerHTML = '<span class="loading"></span> 设置中...';

            try {
                const response = await fetch('/api/setup/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, confirmPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('密码设置成功', 'success');
                    // 跳转到首页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    showToast(data.error || '设置失败', 'error');
                    setupBtn.disabled = false;
                    setupBtn.textContent = '完成设置';
                }
            } catch (error) {
                console.error('设置错误:', error);
                showToast('网络错误，请重试', 'error');
                setupBtn.disabled = false;
                setupBtn.textContent = '完成设置';
            }
        });
    </script>
</body>
</html>

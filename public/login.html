<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OpenClaw</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card fade-in">
            <div class="login-header">
                <a href="https://www.tilldream.com/" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="logo-icon"><img src="/images/logo.webp" alt="Logo"></div>
                    <h1>OpenClaw</h1>
                </a>
                <p>请输入管理密码</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form id="loginForm">
                        <div class="form-group">
                            <label class="form-label">管理密码</label>
                            <input type="password" class="form-control" id="password"
                                   placeholder="请输入密码" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                            登录
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/app.js"></script>
    <script>
        /**
         * Token 验证（自动登录）
         * 检测 URL 参数中是否有 token 和 barCode
         * 如果有，调用验证接口实现免登录
         */
        async function verifyTokenAndLogin() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const barCode = urlParams.get('barCode');
            
            if (!token || !barCode) {
                // 没有 token 参数，显示正常登录界面
                return false;
            }
            
            console.log('[Token验证] 检测到 token 参数:', token.substring(0, 10) + '...');
            console.log('[Token验证] 检测到 barCode 参数:', barCode);
            
            // 显示验证状态
            showToast('正在验证身份...', 'info');
            
            try {
                const response = await fetch('/api/verify-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, barCode })
                });
                
                const data = await response.json();
                
                if (data.code === 0) {
                    // 验证成功
                    showToast('身份验证成功', 'success');
                    
                    // 清除 URL 参数，跳转到首页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                    
                    return true;
                } else {
                    // 验证失败
                    console.log('[Token验证] 验证失败:', data.msg);
                    showToast(data.msg || '身份验证失败', 'error');
                    return false;
                }
            } catch (error) {
                console.error('[Token验证] 请求失败:', error);
                showToast('验证请求失败', 'error');
                return false;
            }
        }
        
        /**
         * 页面加载时先尝试 Token 验证
         */
        (async function init() {
            const verified = await verifyTokenAndLogin();
            if (!verified) {
                // Token 验证未执行或失败，显示正常登录界面
                // 密码输入框获得焦点
                document.getElementById('password').focus();
            }
        })();
        
        /**
         * 登录表单提交
         */
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            if (!password) {
                showToast('请输入密码', 'error');
                return;
            }

            // 显示加载状态
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> 登录中...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (response.ok && data.code === 0) {
                    showToast(data.msg || '登录成功', 'success');
                    // 跳转到首页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    showToast(data.msg || '登录失败', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            } catch (error) {
                console.error('登录错误:', error);
                showToast('网络错误，请重试', 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证 - OpenClaw</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 页面布局 */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color, #f5f7fa);
        }
        
        .verify-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .verify-card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        
        .verify-header {
            margin-bottom: 32px;
        }
        
        .verify-logo {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            display: inline-block;
        }
        
        .verify-logo img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }
        
        .verify-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary, #1a1a2e);
            margin-bottom: 8px;
        }
        
        .verify-subtitle {
            font-size: 14px;
            color: var(--text-secondary, #6b7280);
        }
        
        /* 验证中状态 */
        .verify-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }
        
        .verify-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color, #e5e7eb);
            border-top-color: var(--primary-color, #667eea);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .verify-text {
            margin-top: 16px;
            color: var(--text-secondary, #6b7280);
            font-size: 14px;
        }
        
        .verify-hint {
            margin-top: 8px;
            color: var(--text-muted, #9ca3af);
            font-size: 12px;
        }
        
        /* 验证失败状态 */
        .verify-failed {
            display: none;
            padding: 20px 0;
        }
        
        .verify-failed.active {
            display: block;
        }
        
        .verify-loading.hidden {
            display: none;
        }
        
        .verify-error-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            color: #ef4444;
        }
        
        .verify-error-text {
            color: var(--text-secondary, #6b7280);
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .verify-retry-btn {
            background: var(--primary-color, #667eea);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .verify-retry-btn:hover {
            background: var(--primary-hover, #5a67d8);
        }
    </style>
</head>
<body>
    <div class="verify-wrapper">
        <div class="verify-card">
            <!-- 头部 Logo -->
            <div class="verify-header">
                <div class="verify-logo">
                    <img src="/images/logo.webp" alt="OpenClaw Logo">
                </div>
                <div class="verify-title">OpenClaw Easy</div>
                <div class="verify-subtitle">配置管理系统</div>
            </div>
            
            <!-- 验证中状态 -->
            <div class="verify-loading" id="verifyLoading">
                <div class="verify-spinner"></div>
                <div class="verify-text">正在验证身份...</div>
                <div class="verify-hint">请稍候，验证成功后将自动进入配置页面</div>
            </div>
            
            <!-- 验证失败状态 -->
            <div class="verify-failed" id="verifyFailed">
                <svg class="verify-error-icon" width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <div class="verify-error-text" id="verifyErrorText">身份验证未通过，请重新登录</div>
                <button class="verify-retry-btn" id="retryBtn">返回登录页</button>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== Token 验证逻辑 ====================
        async function verifyToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const barCode = urlParams.get('barCode');
            const from = urlParams.get('from') || 'login';
            
            // 没有 token 参数，根据来源跳回
            if (!token || !barCode) {
                console.log('[验证] 没有 token 参数，跳转来源页');
                navigateToFromPage(from);
                return;
            }
            
            console.log('[验证] 开始验证:', token.substring(0, 10) + '...', barCode);
            
            try {
                const response = await fetch('/api/verifyToken', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, barCode })
                });
                
                const data = await response.json();
                
                console.log('[验证] 结果:', data);
                
                if (data.code === 0) {
                    console.log('[验证] 验证成功，跳转首页');
                    // 验证成功，丢弃 token 和 barCode，直接跳转首页
                    window.location.href = '/';
                } else {
                    console.log('[验证] 验证失败:', data.msg);
                    // 验证失败，丢弃 token 和 barCode，跳回来源页面
                    // 验证失败，直接跳回来源页面
                    navigateToFromPage(from);
                }
            } catch (error) {
                console.error('[验证] 请求失败:', error);
                // 网络错误，直接跳回来源页面
                    navigateToFromPage(from);
            }
        }
        
        // 根据来源跳转到对应页面
        function navigateToFromPage(from) {
            switch (from) {
                case 'setup':
                    window.location.href = '/setup.html';
                    break;
                case 'index':
                    window.location.href = '/login.html';
                    break;
                case 'login':
                default:
                    window.location.href = '/login.html';
                    break;
            }
        }
        
        // 显示失败状态
        function showFailed(message, from) {
            document.getElementById('verifyLoading').classList.add('hidden');
            document.getElementById('verifyFailed').classList.add('active');
            document.getElementById('verifyErrorText').textContent = message;
            // 2秒后自动跳转回来源页
            setTimeout(() => {
                navigateToFromPage(from || 'login');
            }, 2000);
        }
        
        // 返回按钮 - 根据来源跳回
        const urlParams = new URLSearchParams(window.location.search);
        const fromPage = urlParams.get('from') || 'login';
        document.getElementById('retryBtn').addEventListener('click', () => {
            navigateToFromPage(fromPage);
        });
        
        // 页面加载后立即验证
        verifyToken();
    </script>
</body>
</html>
